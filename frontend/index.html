    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function () {
        var perf = typeof window !== "undefined" ? window.performance : null;
        if (!perf) {
          return;
        }

        var noop = function () {};
        var patchMethod = function (name) {
          if (typeof perf[name] === "function") {
            return;
          }
          try {
            Object.defineProperty(perf, name, {
              configurable: true,
              writable: true,
              value: noop,
            });
          } catch (_error) {
            try {
              perf[name] = noop;
            } catch (_ignored) {}
          }
        };

        patchMethod("clearMarks");
        patchMethod("clearMeasures");
      })();
    </script>
    <title>Mr. Malik Scanner</title>
